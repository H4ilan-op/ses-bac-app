<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Révise ton Bac SES</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:#e8e8f0; font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .card { background:#1a1a26; border:1px solid #2a2a40; border-radius:16px; padding:40px; width:100%; max-width:400px; margin:20px; }
  .logo { text-align:center; margin-bottom:28px; font-size:1.5rem; font-weight:600; color:#a78bfa; }
  .tabs { display:flex; gap:8px; margin-bottom:24px; }
  .tab { flex:1; padding:10px; border:1px solid #2a2a40; border-radius:8px; background:none; color:#7a7a9a; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:0.9rem; transition:.2s; }
  .tab.active { border-color:#7c6af7; color:#7c6af7; background:rgba(124,106,247,0.1); }
  .form { display:flex; flex-direction:column; gap:14px; }
  .form input { background:#13131a; border:1px solid #2a2a40; color:#e8e8f0; padding:12px 16px; border-radius:10px; font-size:0.9rem; font-family:'DM Sans',sans-serif; outline:none; transition:.2s; }
  .form input:focus { border-color:#7c6af7; }
  .form button { background:rgba(124,106,247,0.9); border:none; color:#fff; padding:12px; border-radius:10px; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:'DM Sans',sans-serif; transition:.2s; }
  .form button:hover { background:#7c6af7; }
  .msg { font-size:0.82rem; padding:10px 14px; border-radius:8px; text-align:center; display:none; margin-top:4px; }
  .msg.error { background:rgba(247,106,138,.1); color:#f76a8a; display:block; }
  .msg.success { background:rgba(106,247,194,.1); color:#6af7c2; display:block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">📚 Révise ton Bac SES</div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('login')">Connexion</button>
    <button class="tab" onclick="showTab('signup')">Inscription</button>
  </div>
  <div id="login-form" class="form">
    <input type="email" id="login-email" placeholder="Ton email" />
    <input type="password" id="login-password" placeholder="Mot de passe" />
    <button onclick="login()">Se connecter</button>
    <div class="msg" id="login-msg"></div>
  </div>
  <div id="signup-form" class="form" style="display:none">
    <input type="email" id="signup-email" placeholder="Ton email" />
    <input type="password" id="signup-password" placeholder="Mot de passe (6 caractères min)" />
    <button onclick="signup()">Créer mon compte</button>
    <div class="msg" id="signup-msg"></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = 'https://icelztsqfgwvsojvkhys.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_XIR8v41IboQjTzGcnd0EAg_iDH5Q_1F';
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function showTab(tab) {
    document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
    document.getElementById('signup-form').style.display = tab === 'signup' ? 'flex' : 'none';
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  }

  async function login() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { msg.textContent = '❌ ' + error.message; msg.className = 'msg error'; }
    else { msg.textContent = '✅ Connexion réussie !'; msg.className = 'msg success'; setTimeout(() => window.location.href = '/', 1000); }
  }

  async function signup() {
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const msg = document.getElementById('signup-msg');
    const { error } = await supabase.auth.signUp({ email, password });
    if (error) { msg.textContent = '❌ ' + error.message; msg.className = 'msg error'; }
    else { msg.textContent = '✅ Compte créé ! Vérifie ton email pour confirmer.'; msg.className = 'msg success'; }
  }
</script>
</body>
</html>
